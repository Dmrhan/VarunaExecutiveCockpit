name: Build & Push Docker Images

on:
  push:
    branches:
      - main
      - dev
      - SQL-V.1
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  # github.repository = "Dmrhan/VarunaExecutiveCockpit" → lowercased below
  BFF_IMAGE: ghcr.io/${{ github.repository_owner }}/varuna-bff
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/varuna-frontend

jobs:
  # ─────────────────────────────────────────────────────────────
  #  JOB 1: Build & push BFF image
  # ─────────────────────────────────────────────────────────────
  build-bff:
    name: BFF — Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # Required to push to ghcr.io

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BFF_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push BFF (production/MSSQL stage)
        uses: docker/build-push-action@v5
        with:
          context: ./varuna-bff
          target: production
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=bff
          cache-to: type=gha,mode=max,scope=bff

  # ─────────────────────────────────────────────────────────────
  #  JOB 2: Build & push Frontend image
  # ─────────────────────────────────────────────────────────────
  build-frontend:
    name: Frontend — Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Frontend (Nginx stage)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_URL=/api
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
